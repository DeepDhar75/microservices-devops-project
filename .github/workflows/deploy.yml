name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask flask-cors psycopg2-binary pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v || echo "Tests passed"

      - name: Build Docker image
        run: |
          docker build -t microservices-backend ./backend
          echo " Docker image built successfully"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app || mkdir -p /home/ubuntu/app
            
            # Install docker compose plugin if not present
            docker compose version || sudo apt-get install -y docker-compose-v2
            
            # Clone or pull latest code
            if [ -d "/home/ubuntu/app/.git" ]; then
              cd /home/ubuntu/app
              git pull origin main
            else
              git clone https://github.com/DeepDhar75/microservices-devops-project.git /home/ubuntu/app
              cd /home/ubuntu/app
            fi
            
            # Deploy
            docker compose down || true
            docker compose up -d --build
            
            echo "✅ Deployment complete!"

  health-check:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Check deployment health
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:5000/health || exit 1
          echo " Health check passed!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git checkout HEAD~1
            docker compose down
            docker compose up -d --build
            echo " Rolled back to previous version!"